# Sveltia CMS configuration — content manager for naghdyan.com
# Served at /admin. Fields mirror src/content.config.ts; every visible string is
# trilingual { en, ru, hy }. Auth uses the GitHub OAuth handler in api/ (docs/deployment.md).

backend:
  name: github
  repo: ashotpahlevanyan/naghdyan
  branch: main
  # CMS opens `${base_url}/${auth_endpoint}` → https://naghdyan.com/auth
  # (rewritten to /api/auth by vercel.json). Callback is /callback.
  base_url: https://naghdyan.com
  auth_endpoint: auth

# Local editing without GitHub: run `npm run cms:proxy`, then open
# http://localhost:4321/admin while `npm run dev` is running.
local_backend: true

# Where uploaded images are stored / referenced from.
media_folder: public/assets/uploads
public_folder: /assets/uploads

collections:
  # ------------------------------------------------------- SITE CONTENT
  # Singleton settings files: branding/contact and the homepage prose.
  - name: settings
    label: Site content
    files:
      - name: site
        label: Branding & contact
        file: src/content/settings/site.yaml
        fields:
          - name: brand
            label: Brand name
            widget: object
            fields:
              - { name: en, label: English, widget: string }
              - { name: ru, label: Русский, widget: string }
              - { name: hy, label: Հայերեն, widget: string }
          - { name: logo, label: Logo image, widget: image, required: false, hint: "Optional. Falls back to the built-in ‘N’ mark." }
          - { name: favicon, label: Favicon, widget: image, required: false, hint: "Optional browser-tab icon." }
          - { name: portrait, label: Portrait photo, widget: image, required: false, hint: "Shown in the hero. Optional." }
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: contact
            label: Contact methods
            widget: object
            fields:
              - { name: email, label: Email address, widget: string, required: false }
              - { name: telegram, label: Telegram URL, widget: string, required: false, hint: "Full https:// link. Leave empty to hide the button." }
          - name: footer
            label: Footer
            widget: object
            fields:
              - name: rights
                label: Rights text
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
      - name: home
        label: Homepage text
        file: src/content/settings/home.yaml
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - name: eyebrow
                label: Eyebrow
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: lede
                label: Lede
                widget: object
                hint: "Use **bold** and *italic* for emphasis."
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ru, label: Русский, widget: text }
                  - { name: hy, label: Հայերեն, widget: text }
              - name: tags
                label: Tags
                widget: list
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: ctaPrimary
                label: Primary button
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: ctaSecondary
                label: Secondary button
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
          - name: about
            label: About
            widget: object
            fields:
              - name: kicker
                label: Kicker
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: heading
                label: Heading
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: body
                label: Paragraphs
                widget: list
                hint: "One entry per paragraph. **bold** / *italic* supported."
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ru, label: Русский, widget: text }
                  - { name: hy, label: Հայերեն, widget: text }
          - name: focus
            label: Areas of focus
            widget: object
            fields:
              - name: kicker
                label: Kicker
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: heading
                label: Heading
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: cards
                label: Cards
                widget: list
                fields:
                  - { name: icon, label: Icon glyph, widget: string, hint: "A single character, e.g. Ψ ◈ ∞" }
                  - name: sub
                    label: Label
                    widget: object
                    fields:
                      - { name: en, label: English, widget: string }
                      - { name: ru, label: Русский, widget: string }
                      - { name: hy, label: Հայերեն, widget: string }
                  - name: title
                    label: Title
                    widget: object
                    fields:
                      - { name: en, label: English, widget: string }
                      - { name: ru, label: Русский, widget: string }
                      - { name: hy, label: Հայերեն, widget: string }
                  - name: body
                    label: Body
                    widget: object
                    fields:
                      - { name: en, label: English, widget: text }
                      - { name: ru, label: Русский, widget: text }
                      - { name: hy, label: Հայերեն, widget: text }
          - name: psychoontology
            label: Psychoontology
            widget: object
            fields:
              - name: kicker
                label: Kicker
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: heading
                label: Heading
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: intro
                label: Intro
                widget: object
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ru, label: Русский, widget: text }
                  - { name: hy, label: Հայերեն, widget: text }
              - name: quote
                label: Pull quote
                widget: object
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ru, label: Русский, widget: text }
                  - { name: hy, label: Հայերեն, widget: text }
              - name: points
                label: Points
                widget: list
                hint: "Start each with a **bold** lead word."
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ru, label: Русский, widget: text }
                  - { name: hy, label: Հայերեն, widget: text }
          - name: contact
            label: Contact section
            widget: object
            fields:
              - name: kicker
                label: Kicker
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: heading
                label: Heading
                widget: object
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ru, label: Русский, widget: string }
                  - { name: hy, label: Հայերեն, widget: string }
              - name: body
                label: Body
                widget: object
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ru, label: Русский, widget: text }
                  - { name: hy, label: Հայերեն, widget: text }
  # -------------------------------------------------------------- BOOKS
  - name: books
    label: Books
    label_singular: Book
    folder: src/content/books
    extension: yaml
    format: yaml
    create: true
    slug: '{{fields.slug}}'
    summary: '{{fields.title.en}}'
    fields:
      - name: slug
        label: URL slug
        widget: string
        hint: Lowercase words with hyphens. Becomes the page URL /books/<slug>.
      - name: order
        label: Sort order
        widget: number
        value_type: int
        default: 1
        hint: Lower numbers show first.
      - name: title
        label: Title
        widget: object
        fields:
          - { name: en, label: English, widget: string }
          - { name: ru, label: Русский, widget: string }
          - { name: hy, label: Հայերեն, widget: string }
      - name: subtitle
        label: Subtitle
        widget: object
        required: false
        fields:
          - { name: en, label: English, widget: string, required: false }
          - { name: ru, label: Русский, widget: string, required: false }
          - { name: hy, label: Հայերեն, widget: string, required: false }
      - { name: year, label: Year, widget: string }
      - { name: cover, label: Cover image, widget: image, required: false }
      - name: images
        label: Gallery images (slider)
        widget: list
        required: false
        field: { name: image, label: Image, widget: image }
      - name: facts
        label: Facts (chips)
        widget: list
        required: false
        fields:
          - { name: en, label: English, widget: string }
          - { name: ru, label: Русский, widget: string }
          - { name: hy, label: Հայերեն, widget: string }
      - { name: buyLink, label: Buy link (URL), widget: string, required: false }
      - name: description
        label: Description (one entry per paragraph)
        widget: list
        fields:
          - { name: en, label: English, widget: text }
          - { name: ru, label: Русский, widget: text }
          - { name: hy, label: Հայերեն, widget: text }
  # ----------------------------------------------------------- ARTICLES
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    extension: yaml
    format: yaml
    create: true
    slug: '{{fields.slug}}'
    summary: '{{fields.title.en}}'
    fields:
      - name: slug
        label: File slug
        widget: string
        hint: Lowercase words with hyphens (filename only).
      - name: order
        label: Sort order
        widget: number
        value_type: int
        default: 1
      - name: title
        label: Title
        widget: object
        fields:
          - { name: en, label: English, widget: string }
          - { name: ru, label: Русский, widget: string }
          - { name: hy, label: Հայերեն, widget: string }
      - name: source
        label: Source
        widget: object
        required: false
        fields:
          - { name: en, label: English, widget: string, required: false }
          - { name: ru, label: Русский, widget: string, required: false }
          - { name: hy, label: Հայերեն, widget: string, required: false }
      - { name: date, label: Date / year, widget: string }
      - { name: url, label: Link URL, widget: string, default: '#' }

  # ----------------------------------------------------------- LECTURES
  - name: lectures
    label: Lectures
    label_singular: Lecture
    folder: src/content/lectures
    extension: yaml
    format: yaml
    create: true
    slug: '{{fields.slug}}'
    summary: '{{fields.title.en}}'
    fields:
      - name: slug
        label: File slug
        widget: string
        hint: Lowercase words with hyphens (filename only).
      - name: order
        label: Sort order
        widget: number
        value_type: int
        default: 1
      - name: title
        label: Title
        widget: object
        fields:
          - { name: en, label: English, widget: string }
          - { name: ru, label: Русский, widget: string }
          - { name: hy, label: Հայերեն, widget: string }
      - name: description
        label: Description
        widget: object
        required: false
        fields:
          - { name: en, label: English, widget: string, required: false }
          - { name: ru, label: Русский, widget: string, required: false }
          - { name: hy, label: Հայերեն, widget: string, required: false }
      - name: tag
        label: Tag (e.g. "Lecture · 2024")
        widget: object
        required: false
        fields:
          - { name: en, label: English, widget: string, required: false }
          - { name: ru, label: Русский, widget: string, required: false }
          - { name: hy, label: Հայերեն, widget: string, required: false }
      - name: video
        label: Video
        widget: object
        fields:
          - name: type
            label: Platform
            widget: select
            options: [youtube, vimeo]
            default: youtube
          - name: id
            label: Video ID
            widget: string
            hint: The ID only — youtu.be/<ID> or vimeo.com/<ID>.
