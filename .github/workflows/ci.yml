name: CI

# Build + type-check on every push and PR. Deployment itself is handled by
# Vercel's Git integration (auto-deploy on push to main), mirroring anjoy.space
# — this workflow just guards that main always builds.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
