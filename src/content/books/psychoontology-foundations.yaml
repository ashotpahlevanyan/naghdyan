description:
  - en: "This is a placeholder description — replace it with the real book text. Foundations of Psychoontology introduces the central question of Ruben Naghdyan's research: what does it mean for a mind not merely to function, but to be?"
    ru: 'Это текст-заглушка — замените его реальным описанием книги. «Основания психоонтологии» вводят центральный вопрос исследований Рубена Нагдяна: что значит для психики не просто функционировать, но — быть?'
    hy: Սա տեղապահ տեքստ է՝ փոխարինե՛ք այն գրքի իրական նկարագրությամբ։ «Հոգեոնտոլոգիայի հիմունքները» ներկայացնում են Ռուբեն Նաղդյանի հետազոտությունների առանցքային հարցը՝ ի՞նչ է նշանակում հոգեկանի համար ոչ միայն գործել, այլև՝ լինել։
  - en: Drawing on years of practice in Neuro-Linguistic Programming and Emotional-Image Therapy, the book builds a bridge between clinical work and the philosophy of being, offering a new vocabulary for the experience of existence.
    ru: Опираясь на многолетнюю практику в НЛП и эмоционально-образной терапии, книга строит мост между клинической работой и философией бытия, предлагая новый язык для переживания существования.
    hy: Հենվելով ՆԼԾ-ի և էմոցիոնալ-պատկերային թերապիայի բազմամյա պրակտիկայի վրա՝ գիրքը կամուրջ է կառուցում կլինիկական աշխատանքի և կեցության փիլիսոփայության միջև՝ առաջարկելով նոր լեզու գոյության ապրման համար։
  - en: Written for practitioners, researchers, and thoughtful readers alike, it moves from concrete case material toward a coherent framework — psychoontology.
    ru: Написанная и для практиков, и для исследователей, и для вдумчивого читателя, она движется от конкретного материала случаев к целостной модели — психоонтологии.
    hy: Գրված լինելով և՛ պրակտիկների, և՛ հետազոտողների, և՛ մտախոհ ընթերցողի համար՝ այն շարժվում է դեպքերի կոնկրետ նյութից դեպի ամբողջական մոդել՝ հոգեոնտոլոգիա։
